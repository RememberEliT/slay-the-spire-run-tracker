<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>STS Run Tracker</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Optional custom CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-light bg-light px-3">
  <a class="navbar-brand fw-bold" href="/">STS Tracker</a>

  <div class="ms-auto">
      {% if current_user.is_anonymous %}
            <a class="nav-link d-inline"  href="{{ url_for('login') }}">Login</a>
             <a class="nav-link d-inline"  href="{{ url_for('register') }}">Register</a>
      {% else %}
            <a href="{{ url_for('logout') }}">Logout</a>
            <a class="nav-link d-inline" href="/runs">Runs</a>
            <a class="nav-link d-inline" href="/create_run">Create</a>
      {% endif %}
  </div>
</nav>

<div class="container mt-4">
  {% block content %}{% endblock %}
</div>

</body>
</html>
